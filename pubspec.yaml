name: yeogiyo
description: "종로구 생활정보 통합 안내 앱"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.12
  google_sign_in: ^6.2.1
  provider: ^6.1.2
  go_router: ^14.8.1
  google_maps_flutter: ^2.12.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  http: ^1.3.0
  xml: ^6.5.0
  intl: ^0.19.0
  flutter_rating_bar: ^4.0.1
  shared_preferences: ^2.5.5
  flutter_dotenv: ^6.0.0
  package_info_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/jongno_hospitals.json
    - assets/jongno_pharmacies.json
    - .env